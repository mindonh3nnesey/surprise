<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>form</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #0a0a0a;
    --gold: #f0d78c;
    --gold-dim: rgba(240, 215, 140, 0.35);
    --gold-faint: rgba(240, 215, 140, 0.08);
    --text-dimmer: rgba(255, 255, 255, 0.25);
  }

  html, body {
    background: var(--bg);
    color: #eaeaea;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10vh 6vw;
    position: relative;
  }

  .top-line {
    width: 64px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin-bottom: 8vh;
    opacity: 0.7;
  }

  .bottom-line {
    width: 64px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin-top: 8vh;
    opacity: 0.4;
  }

  .mark {
    position: fixed;
    bottom: 20px;
    left: 24px;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: lowercase;
    color: var(--text-dimmer);
    z-index: 5;
  }

  .gallery {
    display: flex;
    gap: 1px;
    width: 100%;
    max-width: 1080px;
    background: rgba(240, 215, 140, 0.12);
  }

  @media (max-width: 860px) {
    .gallery { flex-direction: column; }
  }

  .card {
    position: relative;
    flex: 1;
    background: #0a0a0a;
    border: 1px solid transparent;
    border-radius: 16px;
    overflow: hidden;
    cursor: default;
    transition: border-color 0.6s ease, box-shadow 0.6s ease;
    isolation: isolate;
  }

  .card canvas {
    display: block;
    width: 100%;
    height: 420px;
  }

  @media (max-width: 860px) {
    .card canvas { height: 320px; }
  }

  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 16px;
    padding: 1px;
    background: linear-gradient(160deg, var(--card-edge, rgba(255,255,255,0.08)), transparent 55%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
    z-index: 2;
  }

  .card:hover::before { opacity: 1; }
  .card:hover { box-shadow: 0 0 40px -12px var(--card-glow, rgba(240,215,140,0.15)); }

  .card::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 90px;
    background: linear-gradient(0deg, rgba(240, 215, 140, 0.05), transparent);
    pointer-events: none;
    z-index: 1;
  }

  .card-label {
    position: relative;
    z-index: 3;
    padding: 18px 22px 22px;
    border-top: 1px solid var(--gold-faint);
  }

  .track-name {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: rgba(255, 255, 255, 0.72);
    margin-bottom: 3px;
  }

  .track-artist {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.06em;
    color: var(--text-dimmer);
    text-transform: uppercase;
  }

  .speaker-icon {
    position: absolute;
    top: 14px;
    right: 16px;
    z-index: 4;
    width: 16px;
    height: 16px;
    opacity: 0.32;
    color: var(--icon-color, #ffffff);
    transition: opacity 0.5s ease;
    pointer-events: none;
  }

  .card.is-playing .speaker-icon {
    opacity: 0.85;
    animation: speakerPulse 1.3s ease-in-out infinite;
  }

  @keyframes speakerPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.22); }
  }
</style>
</head>
<body>

  <div class="top-line"></div>

  <div class="gallery">

    <div class="card" id="card-1" style="--card-edge: rgba(230,230,235,0.18); --card-glow: rgba(200,200,210,0.18); --icon-color: #d8dde2;">
      <canvas id="canvas-1"></canvas>
      <svg class="speaker-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="4 9 8 9 12 5 12 19 8 15 4 15 4 9"></polygon>
        <path d="M16 8.5a5 5 0 0 1 0 7"></path>
        <path d="M18.5 6a8.5 8.5 0 0 1 0 12"></path>
      </svg>
      <div class="card-label">
        <div class="track-name">LOOKATME</div>
        <div class="track-artist">Jann</div>
      </div>
      <audio id="audio-1" preload="auto" src="audio/Jann - Lookatme.mp3"></audio>
    </div>

    <div class="card" id="card-2" style="--card-edge: rgba(120,60,140,0.22); --card-glow: rgba(120,60,140,0.18); --icon-color: #b48ec0;">
      <canvas id="canvas-2"></canvas>
      <svg class="speaker-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="4 9 8 9 12 5 12 19 8 15 4 15 4 9"></polygon>
        <path d="M16 8.5a5 5 0 0 1 0 7"></path>
        <path d="M18.5 6a8.5 8.5 0 0 1 0 12"></path>
      </svg>
      <div class="card-label">
        <div class="track-name">Garbage</div>
        <div class="track-artist">Melanie Martinez</div>
      </div>
      <audio id="audio-2" preload="auto" src="audio/Melanie Martinez - GARBAGE.mp3"></audio>
    </div>

    <div class="card" id="card-3" style="--card-edge: rgba(240,215,140,0.3); --card-glow: rgba(240,215,140,0.28); --icon-color: #f0d78c;">
      <canvas id="canvas-3"></canvas>
      <svg class="speaker-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="4 9 8 9 12 5 12 19 8 15 4 15 4 9"></polygon>
        <path d="M16 8.5a5 5 0 0 1 0 7"></path>
        <path d="M18.5 6a8.5 8.5 0 0 1 0 12"></path>
      </svg>
      <div class="card-label">
        <div class="track-name">Gladiator</div>
        <div class="track-artist">Jann</div>
      </div>
      <audio id="audio-3" preload="auto" src="audio/Jann Gladiator.mp3"></audio>
    </div>

  </div>

  <div class="bottom-line"></div>
  <div class="mark">form</div>

<script>
function setupCanvas(canvas) {
  const ctx = canvas.getContext('2d');
  function resize() {
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);
  return ctx;
}

function approach(current, target, speed) {
  return current + (target - current) * speed;
}

let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function setupAudioAnalyser(audioEl) {
  const ctx = getAudioCtx();
  const source = ctx.createMediaElementSource(audioEl);
  const analyser = ctx.createAnalyser();
  analyser.fftSize = 128;
  source.connect(analyser);
  analyser.connect(ctx.destination);
  return { analyser, data: new Uint8Array(analyser.frequencyBinCount) };
}

function fadeOutAndStop(audioEl, onDone) {
  const duration = 1000;
  const startVol = audioEl.volume;
  const startTime = performance.now();
  function step(now) {
    const p = Math.min(1, (now - startTime) / duration);
    audioEl.volume = startVol * (1 - p);
    if (p < 1) {
      requestAnimationFrame(step);
    } else {
      audioEl.pause();
      audioEl.currentTime = 0;
      if (onDone) onDone();
    }
  }
  requestAnimationFrame(step);
}

function bindCardAudio(card, audioEl) {
  const state = { analyser: null, data: null, low: 0, high: 0, playing: false };

  card.addEventListener('mouseenter', () => {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume().catch(() => {});
    if (!state.analyser) {
      const setup = setupAudioAnalyser(audioEl);
      state.analyser = setup.analyser;
      state.data = setup.data;
    }
    audioEl.volume = 1;
    audioEl.play().catch(() => {});
    state.playing = true;
    card.classList.add('is-playing');
  });

  card.addEventListener('mouseleave', () => {
    state.playing = false;
    fadeOutAndStop(audioEl, () => card.classList.remove('is-playing'));
  });

  return state;
}

function updateAudioBands(state) {
  if (!state.analyser) return;
  state.analyser.getByteFrequencyData(state.data);
  const bins = state.data.length;
  let lowSum = 0;
  const lowCount = Math.max(1, Math.floor(bins * 0.15));
  for (let i = 0; i < lowCount; i++) lowSum += state.data[i];
  const rawLow = lowSum / lowCount / 255;

  let highSum = 0;
  const highStart = Math.floor(bins * 0.5);
  const highCount = bins - highStart;
  for (let i = highStart; i < bins; i++) highSum += state.data[i];
  const rawHigh = highSum / highCount / 255;

  state.low = approach(state.low, rawLow, 0.15);
  state.high = approach(state.high, rawHigh, 0.15);
}

(function () {
  const canvas = document.getElementById('canvas-1');
  const card = document.getElementById('card-1');
  const audioEl = document.getElementById('audio-1');
  const ctx = setupCanvas(canvas);
  const audio = bindCardAudio(card, audioEl);

  let intensity = 0;
  let targetIntensity = 0;
  card.addEventListener('mouseenter', () => { targetIntensity = 1; });
  card.addEventListener('mouseleave', () => { targetIntensity = 0; });

  const N = 46;
  const particles = [];
  for (let i = 0; i < N; i++) {
    particles.push({
      x: Math.random(),
      y: Math.random(),
      angle: Math.random() * Math.PI * 2,
      len: 4 + Math.random() * 10,
      phase: Math.random() * Math.PI * 2,
      speed: 0.4 + Math.random() * 0.6
    });
  }

  let t = 0;
  function frame() {
    const w = canvas.getBoundingClientRect().width;
    const h = canvas.getBoundingClientRect().height;
    intensity = approach(intensity, targetIntensity, 0.045);
    updateAudioBands(audio);
    t += 1;

    const densityMod = 1 + audio.low * 1.1;
    const speedMod = 1 + audio.high * 1.6;

    ctx.fillStyle = 'rgba(10,10,10,0.35)';
    ctx.fillRect(0, 0, w, h);

    particles.forEach((p, i) => {
      const pulse = Math.sin(t * 0.05 * p.speed + p.phase);

      const jump = (Math.floor(t * 0.08 + i) % 14 === 0) ? (1 + intensity * 3) : 1;

      const baseX = p.x * w;
      const baseY = p.y * h;
      const offset = (6 + intensity * 26) * pulse * jump * speedMod;

      const stepAngle = Math.round((p.angle + t * 0.002) / (Math.PI / 4)) * (Math.PI / 4);
      const dx = Math.cos(stepAngle) * offset;
      const dy = Math.sin(stepAngle) * offset;

      const x = baseX + dx;
      const y = baseY + dy;

      const alpha = Math.min(1, (0.25 + intensity * 0.55 + Math.abs(pulse) * 0.15) * densityMod);
      const isAccent = i % 9 === 0;
      ctx.strokeStyle = isAccent
        ? `rgba(200,215,225,${alpha})`
        : `rgba(255,255,255,${alpha * 0.8})`;
      ctx.lineWidth = 1 + intensity * 1.2;

      ctx.beginPath();
      ctx.moveTo(x - Math.cos(stepAngle) * p.len, y - Math.sin(stepAngle) * p.len);
      ctx.lineTo(x + Math.cos(stepAngle) * p.len, y + Math.sin(stepAngle) * p.len);
      ctx.stroke();

      if (intensity > 0.15 && Math.random() < 0.008 * (1 + intensity * 3) * speedMod) {
        ctx.strokeStyle = `rgba(255,255,255,${0.5 + intensity * 0.4})`;
        ctx.beginPath();
        ctx.moveTo(x + (Math.random() - 0.5) * 30, y);
        ctx.lineTo(x + (Math.random() - 0.5) * 30, y + (Math.random() - 0.5) * 4);
        ctx.stroke();
      }
    });

    requestAnimationFrame(frame);
  }
  frame();
})();

(function () {
  const canvas = document.getElementById('canvas-2');
  const card = document.getElementById('card-2');
  const audioEl = document.getElementById('audio-2');
  const ctx = setupCanvas(canvas);
  const audio = bindCardAudio(card, audioEl);

  let intensity = 0;
  let targetIntensity = 0;
  card.addEventListener('mouseenter', () => { targetIntensity = 1; });
  card.addEventListener('mouseleave', () => { targetIntensity = 0; });

  const palette = [
    [110, 60, 130],
    [70, 90, 60],
    [180, 130, 140]
  ];

  const N = 20;
  const blobs = [];
  for (let i = 0; i < N; i++) {
    blobs.push({
      x: Math.random(),
      y: Math.random(),
      vx: 0,
      vy: 0,
      r: 18 + Math.random() * 34,
      color: palette[i % palette.length],
      lag: 0.01 + Math.random() * 0.03,
      driftPhase: Math.random() * Math.PI * 2,
      driftSpeed: 0.15 + Math.random() * 0.25
    });
  }

  let t = 0;
  function frame() {
    const w = canvas.getBoundingClientRect().width;
    const h = canvas.getBoundingClientRect().height;
    intensity = approach(intensity, targetIntensity, 0.03);
    updateAudioBands(audio);
    t += 1;

    const densityMod = 1 + audio.low * 1.0;
    const speedMod = 1 + audio.high * 1.4;

    ctx.fillStyle = 'rgba(10,10,10,0.06)';
    ctx.fillRect(0, 0, w, h);
    ctx.globalCompositeOperation = 'lighter';

    blobs.forEach((b) => {
      const driftSignal = Math.sin(t * 0.006 * b.driftSpeed + b.driftPhase);

      const targetVx = driftSignal * (0.15 + intensity * 0.5) * speedMod;
      const targetVy = ((0.08 + intensity * 0.25) + Math.cos(t * 0.004 * b.driftSpeed) * 0.05) * speedMod;

      b.vx = approach(b.vx, targetVx, b.lag);
      b.vy = approach(b.vy, targetVy, b.lag);

      b.x += b.vx * 0.0016;
      b.y += b.vy * 0.0016;

      if (b.y > 1.15) { b.y = -0.15; b.x = Math.random(); }
      if (b.x < -0.15) b.x = 1.15;
      if (b.x > 1.15) b.x = -0.15;

      const x = b.x * w;
      const y = b.y * h;
      const r = b.r * (0.7 + intensity * 0.6);
      const [cr, cg, cbl] = b.color;

      const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
      const alpha = Math.min(0.6, (0.28 + intensity * 0.22) * densityMod);
      grad.addColorStop(0, `rgba(${cr},${cg},${cbl},${alpha})`);
      grad.addColorStop(1, `rgba(${cr},${cg},${cbl},0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    });

    ctx.globalCompositeOperation = 'source-over';
    requestAnimationFrame(frame);
  }
  frame();
})();

(function () {
  const canvas = document.getElementById('canvas-3');
  const card = document.getElementById('card-3');
  const audioEl = document.getElementById('audio-3');
  const ctx = setupCanvas(canvas);
  const audio = bindCardAudio(card, audioEl);

  let intensity = 0;
  let targetIntensity = 0;
  card.addEventListener('mouseenter', () => { targetIntensity = 1; });
  card.addEventListener('mouseleave', () => { targetIntensity = 0; });

  const N = 70;
  const sparks = [];
  function spawnSpark(biasBottom) {
    return {
      x: Math.random(),
      y: biasBottom ? 1 + Math.random() * 0.2 : Math.random(),
      speed: 0.15 + Math.random() * 0.35,
      sway: Math.random() * Math.PI * 2,
      swaySpeed: 0.3 + Math.random() * 0.5,
      swayAmp: 0.01 + Math.random() * 0.02,
      size: 0.6 + Math.random() * 1.8,
      gold: Math.random() < 0.35
    };
  }
  for (let i = 0; i < N; i++) sparks.push(spawnSpark(false));

  let t = 0;
  function frame() {
    const w = canvas.getBoundingClientRect().width;
    const h = canvas.getBoundingClientRect().height;
    intensity = approach(intensity, targetIntensity, 0.02);
    updateAudioBands(audio);
    t += 1;

    const densityMod = 1 + audio.low * 1.0;
    const speedMod = 1 + audio.high * 1.3;

    ctx.fillStyle = 'rgba(10,10,10,0.16)';
    ctx.fillRect(0, 0, w, h);

    sparks.forEach((s) => {
      s.y -= (s.speed * (0.35 + intensity * 1.1)) * 0.0022 * speedMod;
      s.sway += s.swaySpeed * 0.02;

      if (s.y < -0.05) Object.assign(s, spawnSpark(true));

      const x = (s.x + Math.sin(s.sway) * s.swayAmp) * w;
      const y = s.y * h;

      let color;
      const alphaMod = Math.min(1, densityMod);
      if (s.gold) {
        color = `rgba(240,215,140,${(0.35 + intensity * 0.5) * alphaMod})`;
      } else {
        const flicker = 0.5 + 0.5 * Math.sin(t * 0.1 + s.x * 20);
        const r = 140 + flicker * 60;
        color = `rgba(${r},70,50,${(0.3 + intensity * 0.45) * alphaMod})`;
      }

      ctx.fillStyle = color;
      const size = s.size * (0.8 + intensity * 0.9);
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = color;
      ctx.lineWidth = size * 0.4;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x - Math.sin(s.sway) * 2, y + 6 + intensity * 6);
      ctx.stroke();
    });

    const baseGlow = ctx.createRadialGradient(w * 0.5, h * 1.05, 0, w * 0.5, h * 1.05, w * 0.6);
    baseGlow.addColorStop(0, `rgba(20,30,70,${0.25 + intensity * 0.15})`);
    baseGlow.addColorStop(1, 'rgba(20,30,70,0)');
    ctx.fillStyle = baseGlow;
    ctx.fillRect(0, 0, w, h);

    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
